<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>the cockpit — regulus desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🜂</text></svg>">
<style>
  :root{
    --ground:#0A0907; --panel:#100E09; --panel2:#151209;
    --ink:#EFE9DA; --ink-2:#CEC5AF; --muted:#9A9078; --faint:#6E6552;
    --gold:#C9A24E; --gold-mark:#A5843B; --rust:#BF5B33;
    --hair:#262013; --hair-soft:#1A160D;
    --grot:system-ui,-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;
    --serif:'Iowan Old Style','Palatino Nova',Palatino,'Book Antiqua',Georgia,serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  html,body{overflow-x:clip;}
  body{margin:0; background:var(--ground); color:var(--ink); font-family:var(--serif); font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased;}
  ::selection{background:var(--gold); color:var(--ground);}
  .wrap{max-width:1020px; margin:0 auto; padding:18px 14px 90px;}
  .mast{display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--hair); padding-bottom:12px; gap:10px;}
  .mast h1{font-family:var(--grot); font-weight:600; font-size:.64rem; letter-spacing:.28em; text-transform:uppercase; margin:0; white-space:nowrap;}
  .mast h1 b{color:var(--gold); font-weight:600;}
  .live{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:.62rem; color:var(--faint); white-space:nowrap;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--gold);}
  @media (prefers-reduced-motion: no-preference){
    .dot{animation:pulse 2.2s ease-out infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(201,162,78,.5)} 70%{box-shadow:0 0 0 8px rgba(201,162,78,0)} 100%{box-shadow:0 0 0 0 rgba(201,162,78,0)}}
  }
  /* gate */
  #gate{max-width:400px; margin:14vh auto 0; text-align:center; padding:0 8px;}
  #gate h2{font-weight:400; font-style:italic; font-size:1.7rem; margin:0 0 8px;}
  #gate h2 em{color:var(--gold);}
  #gate p{color:var(--muted); font-size:.9rem; margin:0 0 22px;}
  #gate input{width:100%; box-sizing:border-box; background:var(--panel); border:1px solid var(--hair); color:var(--ink);
    font-family:var(--mono); font-size:1.15rem; padding:16px; text-align:center; letter-spacing:.14em; outline:none; border-radius:0;}
  #gate input:focus{border-color:var(--gold-mark);}
  #gate button{margin-top:14px; width:100%; background:none; border:1px solid var(--gold-mark); color:var(--gold);
    font-family:var(--grot); font-weight:600; font-size:.68rem; letter-spacing:.3em; text-transform:uppercase; padding:16px; cursor:pointer;}
  #gate button:active{background:var(--gold); color:var(--ground);}
  #gate .err{color:var(--rust); font-size:.8rem; min-height:1.2em; margin-top:10px; font-style:italic;}
  /* board */
  #board{display:none;}
  .tiles{display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--hair-soft); border:1px solid var(--hair); border-top:2px solid var(--gold-mark); margin:16px 0 4px;}
  @media (min-width:700px){ .tiles{grid-template-columns:repeat(4,1fr);} }
  .tile{background:var(--panel); padding:16px 14px 13px;}
  .tile .k{font-family:var(--grot); font-weight:600; font-size:.52rem; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); display:block; margin-bottom:8px;}
  .tile .v{font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:clamp(1.25rem,5.4vw,1.5rem); line-height:1;}
  .tile .v.pos{color:var(--gold);} .tile .v.neg{color:var(--rust);}
  .tile .s{font-size:.68rem; color:var(--faint); display:block; margin-top:6px; font-style:italic;}
  /* win-rate ring row */
  .pulserow{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--hair-soft); border:1px solid var(--hair); border-top:0; margin-bottom:14px;}
  .pulse{background:var(--panel); padding:14px; text-align:center;}
  .pulse .big{font-family:var(--mono); font-size:clamp(1.2rem,5vw,1.5rem); color:var(--ink);}
  .pulse .big.pos{color:var(--gold);} .pulse .big.neg{color:var(--rust);}
  .pulse .k{font-family:var(--grot); font-weight:600; font-size:.5rem; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); display:block; margin-top:5px;}
  .env{margin:2px 0 18px;}
  .env .bar{height:6px; background:var(--hair); position:relative; overflow:visible;}
  .env .bar i{position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg,var(--gold-mark),var(--gold)); width:0;}
  .env .bar em{position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--rust);}
  .env .lab{font-family:var(--mono); font-size:.62rem; color:var(--faint); margin-top:7px;}
  @media (prefers-reduced-motion: no-preference){ .env .bar i{transition:width 1.1s cubic-bezier(.2,.6,.2,1);} }
  h3{font-family:var(--grot); font-weight:600; font-size:.58rem; letter-spacing:.26em; text-transform:uppercase; color:var(--gold); margin:24px 0 10px;}
  /* lanes scoreboard */
  .lanes{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--hair-soft); border:1px solid var(--hair); border-top:2px solid var(--gold-mark);}
  .lane{background:var(--panel); padding:13px 12px;}
  .lane .nm{font-family:var(--grot); font-weight:600; font-size:.54rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-2);}
  .lane .pl{font-family:var(--mono); font-size:clamp(.95rem,4.4vw,1.15rem); margin-top:6px;}
  .lane .pl.pos{color:var(--gold);} .lane .pl.neg{color:var(--rust);}
  .lane .ct{font-size:.64rem; color:var(--faint); font-style:italic; margin-top:3px;}
  /* sort + cards/table */
  .sortrow{display:flex; gap:8px; margin:0 0 10px;}
  .sortrow button{background:none; border:1px solid var(--hair); color:var(--muted); font-family:var(--grot); font-weight:600;
    font-size:.54rem; letter-spacing:.2em; text-transform:uppercase; padding:8px 14px; cursor:pointer;}
  .sortrow button.on{border-color:var(--gold-mark); color:var(--gold);}
  /* mobile cards */
  .cards{display:flex; flex-direction:column; gap:9px;}
  .cardleg{border:1px solid var(--hair); border-left:3px solid var(--hair); background:var(--panel); padding:12px 14px;}
  .cardleg.pos{border-left-color:var(--gold-mark);} .cardleg.neg{border-left-color:var(--rust);}
  .cl-top{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .cl-c{font-family:var(--mono); font-size:.82rem; color:var(--ink);}
  .cl-pnl{font-family:var(--mono); font-size:1.05rem; white-space:nowrap;}
  .cl-pnl.pos{color:var(--gold);} .cl-pnl.neg{color:var(--rust);}
  .cl-sub{display:flex; justify-content:space-between; gap:8px; margin-top:6px; font-family:var(--mono); font-size:.66rem; color:var(--faint); flex-wrap:wrap;}
  .cl-sub .mv.pos{color:var(--gold);} .cl-sub .mv.neg{color:var(--rust);}
  .badge{font-family:var(--grot); font-weight:600; font-size:.48rem; letter-spacing:.14em; padding:2px 6px; border:1px solid var(--hair); color:var(--muted); text-transform:uppercase;}
  .badge.open{border-color:var(--gold-mark); color:var(--gold);}
  @media (prefers-reduced-motion: no-preference){
    .cardleg{opacity:0; transform:translateY(10px); animation:up .5s cubic-bezier(.2,.6,.2,1) forwards;}
    @keyframes up{to{opacity:1; transform:none}}
  }
  /* desktop table */
  .tblwrap{display:none;}
  @media (min-width:820px){
    .cards{display:none;}
    .tblwrap{display:block; overflow-x:auto; border:1px solid var(--hair); border-top:2px solid var(--gold-mark);}
  }
  table{border-collapse:collapse; width:100%; font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:.76rem; background:var(--panel);}
  th{font-family:var(--grot); font-weight:600; font-size:.52rem; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); text-align:left; padding:9px 10px; border-bottom:1px solid var(--hair); white-space:nowrap;}
  td{padding:8px 10px; border-bottom:1px solid var(--hair-soft); color:var(--ink-2); white-space:nowrap;}
  tr:last-child td{border-bottom:0;}
  tbody tr:hover td{background:rgba(201,162,78,.04);}
  .r{text-align:right;} .pos{color:var(--gold);} .neg{color:var(--rust);} .dim{color:var(--faint);}
  .note{font-size:.72rem; color:var(--faint); font-style:italic; margin-top:12px;}
  .foot{margin-top:30px; border-top:1px solid var(--hair); padding-top:14px; font-size:.62rem; color:var(--faint); font-family:var(--grot); letter-spacing:.14em; text-transform:uppercase;}
  a{color:var(--gold); text-decoration:none;}
  .flash{position:fixed; top:12px; right:12px; background:var(--panel2); border:1px solid var(--gold-mark); color:var(--gold);
    font-family:var(--grot); font-weight:600; font-size:.56rem; letter-spacing:.2em; text-transform:uppercase; padding:8px 12px; opacity:0; transition:opacity .4s; pointer-events:none; z-index:9;}
  .flash.on{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <div class="mast">
    <h1><b>🜂 kapidhvaja</b> · cockpit</h1>
    <span class="live"><span class="dot"></span><span id="asof">—</span></span>
  </div>

  <div id="gate">
    <h2>crew <em>only.</em></h2>
    <p>this door opens for the principal. encrypted at rest.</p>
    <input type="password" id="pw" placeholder="passphrase" autocomplete="current-password" inputmode="text">
    <button id="unlock">open the cockpit</button>
    <div class="err" id="err"></div>
  </div>

  <div id="board">
    <div class="tiles" id="tiles"></div>
    <div class="pulserow" id="pulserow"></div>
    <div class="env" id="env"></div>
    <h3>the lanes — who's earning today</h3>
    <div class="lanes" id="lanes"></div>
    <h3>the live book — every trade as entered</h3>
    <div class="sortrow">
      <button id="s-time" class="on">by time</button>
      <button id="s-pnl">by p&amp;l</button>
      <button id="s-mv">by move</button>
    </div>
    <div class="cards" id="cards"></div>
    <div class="tblwrap"><table>
      <thead><tr><th>in</th><th>lane</th><th>contract</th><th>view</th><th class="r">qty</th><th class="r">entry</th><th class="r">mark</th><th class="r">move</th><th class="r">p&amp;l ₹</th><th>state</th></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>
    <p class="note" id="note"></p>
    <div class="foot">🜂 owner's instrument · auto-refreshes · <a href="/">the public book →</a></div>
  </div>
</div>
<div class="flash" id="flash">updated</div>

<script>
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
let PASS = null, SORT = 'time', DATA = null;

async function decrypt(payload, pass){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(payload.salt), iterations:200000, hash:'SHA-256'}, km,
    {name:'AES-GCM', length:256}, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(payload.iv)}, key, b64(payload.data));
  return JSON.parse(new TextDecoder().decode(plain));
}
const loadPayload = async () => (await fetch('desk-data.json?v=' + Date.now(), {cache:'no-store'})).json();
const inr = v => { const n = Math.round(v); return (n<0?'−₹':'+₹') + Math.abs(n).toLocaleString('en-IN'); };
const mvOf = l => (l.mark && l.entry) ? (l.mark - l.entry)/l.entry*100 : null;

function countUp(el, target, fmt){
  if(reduce){ el.textContent = fmt(target); return; }
  const t0 = performance.now(), dur = 900, from = 0;
  const step = t => { const k = Math.min(1,(t-t0)/dur); el.textContent = fmt(from + (target-from)*(1-Math.pow(1-k,3))); if(k<1) requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

function render(d, first){
  DATA = d;
  document.getElementById('gate').style.display = 'none';
  document.getElementById('board').style.display = 'block';
  document.getElementById('asof').textContent = 'as of ' + d.asof;
  const legs = d.legs;
  const marked = legs.filter(l => l.pnl != null);
  const wins = marked.filter(l => l.pnl > 0), losses = marked.filter(l => l.pnl < 0);
  const tot = marked.reduce((a,l) => a + l.pnl, 0);
  const dayR = tot / d.r_unit;
  const best = marked.length ? marked.reduce((a,b) => a.pnl > b.pnl ? a : b) : null;
  const worst = marked.length ? marked.reduce((a,b) => a.pnl < b.pnl ? a : b) : null;

  // tiles with count-up
  const tiles = document.getElementById('tiles');
  tiles.innerHTML =
    `<div class="tile"><span class="k">book p&l</span><span class="v ${tot>=0?'pos':'neg'}" id="t-pnl"></span><span class="s">${(dayR>=0?'+':'')}${dayR.toFixed(2)}R today</span></div>`+
    `<div class="tile"><span class="k">win rate (live)</span><span class="v" id="t-wr"></span><span class="s">${wins.length} green · ${losses.length} red · ${legs.length - marked.length} unmarked</span></div>`+
    `<div class="tile"><span class="k">deployed</span><span class="v" id="t-dep"></span><span class="s">of ₹${Math.round(d.envelope/1000)}k envelope</span></div>`+
    `<div class="tile"><span class="k">capital</span><span class="v">₹${(d.capital/100000).toFixed(2)}L</span><span class="s">start of day</span></div>`;
  countUp(document.getElementById('t-pnl'), tot, v => inr(v));
  countUp(document.getElementById('t-wr'), marked.length ? wins.length/marked.length*100 : 0, v => v.toFixed(0) + '%');
  countUp(document.getElementById('t-dep'), d.deployed/1000, v => '₹' + Math.round(v) + 'k');

  document.getElementById('pulserow').innerHTML =
    `<div class="pulse"><span class="big pos">${best ? inr(best.pnl) : '—'}</span><span class="k">best · ${best ? best.c.split(' ')[0] : ''}</span></div>`+
    `<div class="pulse"><span class="big neg">${worst ? inr(worst.pnl) : '—'}</span><span class="k">worst · ${worst ? worst.c.split(' ')[0] : ''}</span></div>`+
    `<div class="pulse"><span class="big">${marked.length ? (marked.reduce((a,l) => a + (mvOf(l)||0), 0)/marked.length).toFixed(1) + '%' : '—'}</span><span class="k">avg move</span></div>`;

  const pct = Math.min(100, d.deployed/d.envelope*100);
  document.getElementById('env').innerHTML =
    `<div class="bar"><i id="envbar"></i><em style="left:${(720000/d.envelope*100).toFixed(1)}%"></em></div>`+
    `<div class="lab">envelope ${pct.toFixed(0)}% used · soft line ₹720k · ceiling ₹${Math.round(d.envelope/1000)}k</div>`;
  requestAnimationFrame(() => { document.getElementById('envbar').style.width = pct.toFixed(1) + '%'; });

  // lanes scoreboard
  const lanes = {};
  legs.forEach(l => { const k = l.lane; lanes[k] = lanes[k] || {pl:0, n:0, g:0}; if(l.pnl!=null){ lanes[k].pl += l.pnl; if(l.pnl>0) lanes[k].g++; } lanes[k].n++; });
  document.getElementById('lanes').innerHTML = Object.entries(lanes).sort((a,b) => b[1].pl - a[1].pl).map(([k,v]) =>
    `<div class="lane"><div class="nm">${k}</div><div class="pl ${v.pl>=0?'pos':'neg'}">${inr(v.pl)}</div><div class="ct">${v.n} legs · ${v.g} green</div></div>`).join('');

  // legs — sorted
  let ls = [...legs];
  if(SORT === 'pnl') ls.sort((a,b) => (b.pnl??-1e9) - (a.pnl??-1e9));
  else if(SORT === 'mv') ls.sort((a,b) => (mvOf(b)??-1e9) - (mvOf(a)??-1e9));
  else ls.sort((a,b) => a.t.localeCompare(b.t));

  document.getElementById('cards').innerHTML = ls.map((l,i) => {
    const mv = mvOf(l);
    const cls = (l.pnl??0) > 0 ? 'pos' : (l.pnl??0) < 0 ? 'neg' : '';
    return `<div class="cardleg ${cls}" style="animation-delay:${Math.min(i*45, 500)}ms">
      <div class="cl-top"><span class="cl-c">${l.c}</span><span class="cl-pnl ${cls}">${l.pnl!=null ? inr(l.pnl) : '—'}</span></div>
      <div class="cl-sub">
        <span>${l.t} · ${l.lane} · ${l.v}</span>
        <span>${l.entry.toFixed(2)} → ${l.mark ? l.mark.toFixed(2) : '—'} <span class="mv ${mv>=0?'pos':'neg'}">${mv!=null ? (mv>0?'+':'')+mv.toFixed(1)+'%' : ''}</span></span>
        <span class="badge ${l.state==='OPEN'?'open':''}">${l.state}</span>
      </div></div>`;
  }).join('');
  document.getElementById('rows').innerHTML = ls.map(l => {
    const mv = mvOf(l);
    return `<tr><td class="dim">${l.t}</td><td class="dim">${l.lane}</td><td>${l.c}</td><td>${l.v}</td>`+
      `<td class="r">${(l.q||0).toLocaleString('en-IN')}</td><td class="r">${l.entry.toFixed(2)}</td>`+
      `<td class="r">${l.mark ? l.mark.toFixed(2) : '—'}</td>`+
      `<td class="r ${mv>=0?'pos':'neg'}">${mv!=null ? (mv>0?'+':'')+mv.toFixed(1)+'%' : '—'}</td>`+
      `<td class="r ${(l.pnl||0)>=0?'pos':'neg'}">${l.pnl!=null ? inr(l.pnl) : '—'}</td>`+
      `<td><span class="badge ${l.state==='OPEN'?'open':''}">${l.state}</span></td></tr>`;
  }).join('');
  document.getElementById('note').textContent = d.note || '';
  if(!first){ const f = document.getElementById('flash'); f.classList.add('on'); setTimeout(() => f.classList.remove('on'), 1600); }
}

['time','pnl','mv'].forEach(k => document.getElementById('s-'+k).addEventListener('click', () => {
  SORT = k;
  ['time','pnl','mv'].forEach(x => document.getElementById('s-'+x).classList.toggle('on', x===k));
  if(DATA) render(DATA, true);
}));

async function go(){
  const err = document.getElementById('err'); err.textContent = '';
  try{
    const d = await decrypt(await loadPayload(), document.getElementById('pw').value);
    PASS = document.getElementById('pw').value;
    try{ sessionStorage.setItem('kd', PASS); }catch(e){}
    render(d, true);
  }catch(e){ err.textContent = 'the door stays shut — wrong phrase, or no data published yet.'; }
}
document.getElementById('unlock').addEventListener('click', go);
document.getElementById('pw').addEventListener('keydown', e => { if(e.key === 'Enter') go(); });
(async () => {
  try{
    const saved = sessionStorage.getItem('kd');
    if(saved){ PASS = saved; render(await decrypt(await loadPayload(), saved), true); }
  }catch(e){}
})();
// auto-refresh: poll for a fresh payload every 90s while unlocked
setInterval(async () => {
  if(!PASS) return;
  try{
    const d = await decrypt(await loadPayload(), PASS);
    if(DATA && d.asof !== DATA.asof) render(d, false);
  }catch(e){}
}, 90000);
</script>
</body>
</html>
